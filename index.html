<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动首页 - 线上主题活动</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }
        header {
            background: #2563eb;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 99;
        }
        .nav-wrap {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }
        .logo {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            padding: 15px 0;
            text-decoration: none;
        }
        .nav-list {
            display: flex;
            list-style: none;
        }
        .nav-list li a {
            display: block;
            color: #fff;
            text-decoration: none;
            padding: 20px 24px;
            font-size: 16px;
            transition: background 0.3s;
        }
        .nav-list li a:hover, .nav-list li a.active {
            background: #1d4ed8;
        }
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .card {
            background: #fff;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        h2 {
            color: #1e293b;
            margin-bottom: 16px;
            font-size: 26px;
        }
        p {
            font-size: 16px;
            margin-bottom: 12px;
            color: #475569;
        }
        .btn {
            display: inline-block;
            padding: 12px 28px;
            background: #2563eb;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            margin-top: 10px;
            transition: 0.3s;
        }
        .btn:hover {
            background: #1d4ed8;
        }
        footer {
            background: #1e293b;
            color: #cbd5e1;
            text-align: center;
            padding: 30px 0;
            margin-top: 60px;
        }
    </style>
</head>
<body>
    <header>
        <div class="nav-wrap">
            <a href="index.html" class="logo">夏日狂欢活动</a>
            <ul class="nav-list">
                <li><a href="index.html" class="active">活动首页</a></li>
                <li><a href="page1.html">活动规则</a></li>
                <li><a href="page2.html">奖品展示</a></li>
            </ul>
        </div>
    </header>

    <main class="container">
        <div class="card">
            <h2>欢迎参与夏日线上狂欢活动</h2>
            <p>本次活动面向全体用户开放，参与互动即可免费抽取实物周边、优惠券、会员礼包等多重福利！</p>
            <p>活动时间：2026.07.01 - 2026.08.01</p>
            <a href="page1.html" class="btn">查看完整活动规则</a>
        </div>

        <div class="card">
            <h2>活动亮点</h2>
            <p>1. 零门槛参与，无需付费</p>
            <p>2. 每日签到额外增加抽奖次数</p>
            <p>3. 百分百中奖，无空奖</p>
            <a href="page2.html" class="btn">浏览全部奖品</a>
        </div>
    </main>

    <footer>
        <p>© 2026 线上活动专题页</p>
    </footer>
</body>
</html>
