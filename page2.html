<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>往期活动 - 幻方线上活动</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }
        header {
            background: #2563eb;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 99;
        }
        .nav-wrap {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }
        .logo {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            padding: 15px 0;
            text-decoration: none;
        }
        .nav-list {
            display: flex;
            list-style: none;
        }
        .nav-list li a {
            display: block;
            color: #fff;
            text-decoration: none;
            padding: 20px 24px;
            font-size: 16px;
            transition: background 0.3s;
        }
        .nav-list li a:hover, .nav-list li a.active {
            background: #1d4ed8;
        }
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .card {
            background: #fff;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        h2 {
            color: #1e293b;
            margin-bottom: 16px;
            font-size: 26px;
        }
        p {
            font-size: 16px;
            margin-bottom: 12px;
            color: #475569;
        }
        .btn {
            display: inline-block;
            padding: 12px 28px;
            background: #2563eb;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            margin-top: 10px;
            transition: 0.3s;
        }
        .btn:hover {
            background: #1d4ed8;
        }
        footer {
            background: #1e293b;
            color: #cbd5e1;
            text-align: center;
            padding: 30px 0;
            margin-top: 60px;
        }
    </style>
</head>
<body>
    <header>
        <div class="nav-wrap">
            <a href="index.html" class="logo">往期活动</a>
            <ul class="nav-list">
                <li><a href="index.html">最新活动</a></li>
                <li><a href="page1.html">活动详情</a></li>
                <li><a href="page2.html" class="active">往期活动</a></li>
            </ul>
        </div>
    </header>

    <main class="container">
        <div class="card">
            <h2>往期活动列表（不标明起止时间，从上到下依次最近）</h2>
            <p>1.寒假皮肤定制优惠活动</p>
            <p>2.2025新年大优惠</p>
            <p>3.大型节假日优惠活动</p>
            <p>4.暑期皮肤定制活动</p>
            <p>5.优惠皮肤定制活动</p>
            <p>6.第二次优惠皮肤定制活动</p>
            <p>7.2026新年大优惠</p>
            <input type="输入以添加新内容（仅限管理员）">
            <a href="index.html" class="btn">返回首页</a>
        </div>
    </main>

    <footer>
        <p>© 2026 幻方游戏工作室线上活动专题页</p>
    </footer>
</body>
</html>
