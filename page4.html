<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>幻方工作室彩蛋页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", system-ui, sans-serif;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #16213e 0%, #0f0f23 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            transition: filter 0.4s ease;
        }
        /* 永久锁定遮罩 */
        .lock-mask {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.97);
            z-index: 99999;
            display: none;
            flex-direction: column;
            gap: 24px;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .lock-mask h1 {
            font-size: clamp(26px,6vw,42px);
            color: #ff5c5c;
            letter-spacing: 2px;
            text-align: center;
        }
        .lock-mask p {
            font-size: clamp(14px,3vw,20px);
            color: #b0b8d4;
            text-align: center;
        }
        .admin-btn {
            margin-top: 30px;
            padding: 14px 36px;
            font-size: clamp(16px,3vw,18px);
            background: #3b82f6;
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            min-width: 200px;
        }
        .admin-btn:active {
            background: #2563eb;
        }
        /* 管理员解锁弹窗 */
        .admin-dialog {
            position: fixed;
            width: min(90vw,420px);
            padding: clamp(24px,5vw,36px);
            background: #1e293b;
            border-radius: 16px;
            border: 1px solid #475569;
            z-index: 100000;
            display: none;
            flex-direction: column;
            gap: 20px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
        .admin-dialog h3 {
            font-size: clamp(20px,4vw,24px);
            color: #fff;
            text-align: center;
        }
        .admin-dialog input {
            width: 100%;
            padding: 14px;
            font-size: clamp(16px,3vw,18px);
            border-radius: 8px;
            border: 1px solid #64748b;
            background: #0f172a;
            color: #fff;
            outline: none;
        }
        .dialog-btns {
            display: flex;
            gap: 12px;
            flex-wrap: nowrap;
        }
        .dialog-btns button {
            flex: 1;
            padding: 14px 8px;
            font-size: clamp(15px,3vw,17px);
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }
        .confirm-unlock {
            background: #22c55e;
            color: white;
        }
        .close-dialog {
            background: #64748b;
            color: white;
        }
        .main-box {
            text-align: center;
            padding: clamp(30px,8vw,60px) clamp(20px,6vw,80px);
            border: 1px solid rgba(140, 180, 255, 0.15);
            border-radius: 24px;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(16px);
            box-shadow: 0 0 80px rgba(100, 160, 255, 0.12);
            position: relative;
            z-index: 2;
            width: min(92vw, 700px);
        }
        .title {
            font-size: clamp(22px,5vw,40px);
            letter-spacing: 2px;
            margin-bottom: clamp(24px,5vw,40px);
            background: linear-gradient(90deg, #74b9ff, #a29bfe);
            -webkit-background-clip: text;
            color: transparent;
            line-height: 1.4;
        }
        .time-wrap {
            font-size: clamp(26px,6vw,52px);
            padding: clamp(16px,4vw,24px) clamp(20px,5vw,40px);
            border-radius: 16px;
            background: rgba(255,255,255,0.05);
            letter-spacing: 2px;
            color: #e0e8ff;
            line-height: 1.3;
        }
        .tip-text {
            margin-top: clamp(20px,4vw,36px);
            font-size: clamp(14px,3vw,17px);
            color: #8892b0;
        }
        /* 全屏动态水印 */
        .watermark {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0.08;
            overflow: hidden;
        }
        .watermark-item {
            position: absolute;
            font-size: 14px;
            color: #fff;
            transform: rotate(-25deg);
            white-space: nowrap;
        }
        /* 打印空白拦截 */
        @media print {
            body * {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <!-- 锁定遮罩 -->
    <div class="lock-mask" id="lockMask">
        <h1>截图次数已用尽</h1>
        <p>本页面仅允许截屏一次，清除浏览器缓存才可重置</p>
        <button class="admin-btn" id="unlockBtn">管理员解锁通道</button>
    </div>

    <!-- 管理员密钥弹窗 -->
    <div class="admin-dialog" id="adminDialog">
        <h3>管理员解锁验证</h3>
        <input type="password" id="keyInput" placeholder="请输入管理员密钥">
        <div class="dialog-btns">
            <button class="confirm-unlock" id="confirmUnlock">确认解锁</button>
            <button class="close-dialog" id="closeDialog">关闭</button>
        </div>
    </div>

    <!-- 全屏水印 -->
    <div class="watermark" id="waterBox"></div>

    <!-- 主内容 -->
    <div class="main-box">
        <div class="title">幻方工作室彩蛋页，请截图保留</div>
        <div class="time-wrap" id="timeShow"></div>
        <div class="tip-text">标准北京时间 · 时间不可篡改</div>
    </div>

<script>
    const mask = document.getElementById('lockMask');
    const body = document.body;
    const STORAGE_KEY = "hf_studio_capture_lock";
    // 管理员密钥，可自行修改
    const ADMIN_PASSWORD = "hf2026cube";
    const unlockBtn = document.getElementById('unlockBtn');
    const adminDialog = document.getElementById('adminDialog');
    const keyInput = document.getElementById('keyInput');
    const confirmUnlock = document.getElementById('confirmUnlock');
    const closeDialog = document.getElementById('closeDialog');

    let isLocked = localStorage.getItem(STORAGE_KEY) === "1";

    // 页面加载时如果已标记截图，直接锁定
    if(isLocked) lockPage();

    // ========== 1. 实时北京时间 ==========
    function refreshTime() {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        const h = String(now.getHours()).padStart(2, '0');
        const mi = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('timeShow').innerText = `${y}-${m}-${d} ${h}:${mi}:${s}`;
    }
    refreshTime();
    setInterval(refreshTime, 1000);

    // ========== 2. 生成全屏水印（适配手机屏幕） ==========
    function createWatermark() {
        const wmBox = document.getElementById('waterBox');
        const text = "幻方工作室 一次性彩蛋";
        const gapX = 220;
        const gapY = 160;
        const w = window.innerWidth;
        const h = window.innerHeight;
        for(let y = -80; y < h + 80; y += gapY) {
            for(let x = -120; x < w + 120; x += gapX) {
                let span = document.createElement('span');
                span.className = "watermark-item";
                span.innerText = text;
                span.style.left = x + "px";
                span.style.top = y + "px";
                wmBox.appendChild(span);
            }
        }
    }
    createWatermark();
    // 窗口大小变化重新生成水印（手机横竖屏切换）
    window.addEventListener('resize', ()=>{
        document.getElementById('waterBox').innerHTML = '';
        createWatermark();
    })

    // ========== 3. 锁定页面核心函数 ==========
    function lockPage() {
        if(isLocked) return;
        localStorage.setItem(STORAGE_KEY, "1");
        isLocked = true;
        mask.style.display = "flex";
        body.style.filter = "blur(12px) brightness(0.15)";
        body.style.pointerEvents = "none";
        // 闪烁干扰二次截图
        setInterval(() => {
            if(isLocked) {
                body.style.opacity = body.style.opacity === "0" ? "1" : "0";
            }
        }, 120);
    }

    // ========== 4. 管理员解锁函数（清除锁定标记） ==========
    function unlockPage() {
        localStorage.removeItem(STORAGE_KEY);
        isLocked = false;
        mask.style.display = "none";
        body.style.filter = "none";
        body.style.opacity = "1";
        body.style.pointerEvents = "auto";
        adminDialog.style.display = "none";
        keyInput.value = "";
        alert("解锁成功，可重新截图");
    }

    // 打开解锁弹窗
    unlockBtn.addEventListener("click", () => {
        adminDialog.style.display = "flex";
    });
    // 关闭弹窗
    closeDialog.addEventListener("click", () => {
        adminDialog.style.display = "none";
        keyInput.value = "";
    });
    // 验证密钥解锁
    confirmUnlock.addEventListener("click", () => {
        if(keyInput.value === ADMIN_PASSWORD) {
            unlockPage();
        } else {
            alert("密钥错误，无法解锁");
            keyInput.value = "";
        }
    });

    // ========== 5. 多层截屏触发监听（手机截屏有效） ==========
    document.addEventListener('visibilitychange', () => {
        if(document.hidden) lockPage();
    });
    window.addEventListener('blur', () => lockPage());
    window.addEventListener('resize', () => lockPage());

    // ========== 6. 禁止复制、右键、各类保存快捷键 ==========
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.oncopy = e => e.preventDefault();
    document.oncut = e => e.preventDefault();
    document.onpaste = e => e.preventDefault();
    window.onbeforeprint = lockPage;

    document.addEventListener('keydown', e => {
        const key = e.key.toLowerCase();
        if(e.key === 'F12' ||
           (e.ctrlKey && key === 's') ||
           (e.ctrlKey && key === 'p') ||
           (e.ctrlKey && key === 'u')) {
            e.preventDefault();
            lockPage();
        }
    });

    // ========== 7. 检测开发者工具，打开直接锁定 ==========
    setInterval(() => {
        const width = window.outerWidth - window.innerWidth;
        const height = window.outerHeight - window.innerHeight;
        if(width > 120 || height > 120) lockPage();
    }, 600);
</script>
</body>
</html>
