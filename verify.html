<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>验证中转页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #f5f7fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .box {
            background: #fff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            width: 350px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }
        #numInput {
            width: 100%;
            height: 45px;
            padding: 0 15px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
            margin-bottom: 20px;
        }
        #numInput:focus {
            border-color: #409eff;
        }
        #submitBtn {
            width: 100%;
            height: 45px;
            background: #409eff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        #submitBtn:hover {
            background: #337ecc;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>请输入访问密码</h2>
        <input type="number" id="numInput" placeholder="输入数字密码">
        <button id="submitBtn">验证进入主页</button>
    </div>

    <script>
        // 修改这里的数字密码
        const correctNum = 20262027;
        // 目标页面是你的 yincang.html
        const targetPage = "yincang.html";

        const input = document.getElementById('numInput');
        const btn = document.getElementById('submitBtn');

        btn.onclick = function() {
            let val = Number(input.value);
            if (val === correctNum) {
                alert("验证通过，进入");
                window.location.href = targetPage;
            } else {
                alert("密码错误，请重新输入");
                input.value = "";
                input.focus();
            }
        }

        // 按下回车直接提交
        input.onkeydown = function(e) {
            if (e.key === 'Enter') {
                btn.click();
            }
        }
    </script>
</body>
</html>
