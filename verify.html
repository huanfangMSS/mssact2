<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中转验证页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #f5f7fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .box {
            background: #fff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            width: 350px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        .tip {
            font-size: 13px;
            color: #888;
            text-align: center;
            margin-bottom: 25px;
        }
        #numInput {
            width: 100%;
            height: 45px;
            padding: 0 15px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
            margin-bottom: 20px;
        }
        #numInput:focus {
            border-color: #409eff;
        }
        #submitBtn {
            width: 100%;
            height: 45px;
            background: #409eff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        #submitBtn:hover {
            background: #337ecc;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>输入访问密码</h2>
        <p class="tip">幻方游戏</p>
        <input type="number" id="numInput" placeholder="输入数字密码">
        <button id="submitBtn">确认进入</button>
    </div>

    <script>
        // 密码与对应页面配置，自行增删修改
        const pageMap = {
            20262027: "yincang.html",    // 密码20262027 → 隐藏404页面
            520789: "page3.html",    // 密码520789 → 特殊定价公示页
            888888: "404.html",      // 密码888888 → 无
            904512: "page4.html",  //
        };

        const input = document.getElementById('numInput');
        const btn = document.getElementById('submitBtn');

        btn.onclick = function() {
            let pwd = Number(input.value);
            // 判断密码是否存在配置里
            if (pageMap.hasOwnProperty(pwd)) {
                alert("验证成功，正在跳转！");
                window.location.href = pageMap[pwd];
            } else {
                alert("密码错误，不存在该通道！");
                input.value = "";
                input.focus();
            }
        }

        // 回车快速提交
        input.onkeydown = function(e) {
            if (e.key === 'Enter') {
                btn.click();
            }
        }
    </script>
</body>
</html>
